name: Build APK & Publish Release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "!apps/mobile/scripts/**"
      - "!apps/mobile/**/*.md"

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve build profile
        id: profile
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

      - name: Build APK on EAS (waits for completion)
        id: build
        run: |
          cd apps/mobile
          eas build \
            --platform android \
            --profile ${{ steps.profile.outputs.profile }} \
            --non-interactive \
            --json > /tmp/eas-build.json
          cat /tmp/eas-build.json | jq .
          APK_URL=$(jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty' /tmp/eas-build.json)
          if [ -z "$APK_URL" ]; then
            BUILD_ID=$(jq -r '.[0].id' /tmp/eas-build.json)
            echo "Build finished but no artifact URL in JSON. Fetching from build:view..."
            eas build:view "$BUILD_ID" --json > /tmp/eas-view.json
            APK_URL=$(jq -r '.artifacts.applicationArchiveUrl // .artifacts.buildUrl // empty' /tmp/eas-view.json)
          fi
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "APK URL: $APK_URL"

      - name: Download APK
        run: |
          curl -L "${{ steps.build.outputs.apk_url }}" -o gymnasia.apk
          ls -lh gymnasia.apk

      - name: Get version info
        id: version
        run: |
          VERSION=$(jq -r '.expo.version' apps/mobile/app.json)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="v${VERSION}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Gymnasia ${{ steps.version.outputs.version }} (${{ steps.version.outputs.tag }})"
          body: |
            ## Gymnasia APK - ${{ steps.version.outputs.version }}

            **Build profile:** `${{ steps.profile.outputs.profile }}`
            **Commit:** ${{ github.sha }}

            ### Install
            Download `gymnasia.apk` and install on your Android device.
            You may need to enable "Install from unknown sources" in Android settings.
          files: gymnasia.apk
          draft: false
          prerelease: ${{ steps.profile.outputs.profile == 'preview' }}
