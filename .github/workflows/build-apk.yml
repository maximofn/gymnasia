name: Build APK & Publish Release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "!apps/mobile/scripts/**"
      - "!apps/mobile/**/*.md"

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve build profile
        id: profile
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

      - name: Compute next version from conventional commits
        id: version
        run: |
          # Get latest version tag (or default to 0.0.0)
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            CURRENT="0.0.0"
            REF="$(git rev-list --max-parents=0 HEAD)"
          else
            CURRENT="${LATEST_TAG#v}"
            # Strip SHA suffix if present (v1.0.0-abc1234 -> 1.0.0)
            CURRENT=$(echo "$CURRENT" | sed 's/-[a-f0-9]*$//')
            REF="$LATEST_TAG"
          fi

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          # Analyze commits since last tag
          BUMP="none"
          while IFS= read -r MSG; do
            if echo "$MSG" | grep -qiE "BREAKING[ -]CHANGE|^[a-z]+(\(.*\))?!:"; then
              BUMP="major"
              break
            elif echo "$MSG" | grep -qE "^feat(\(.*\))?:"; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$MSG" | grep -qE "^fix(\(.*\))?:"; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done < <(git log "$REF"..HEAD --pretty=format:"%s" 2>/dev/null)

          # Default to patch if no conventional commits found but workflow was triggered
          [ "$BUMP" = "none" ] && BUMP="patch"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${NEXT}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Version: $CURRENT -> $NEXT ($BUMP)"

      - name: Update version in app.json
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          jq --arg v "$NEXT" '.expo.version = $v' apps/mobile/app.json > /tmp/app.json
          mv /tmp/app.json apps/mobile/app.json
          echo "Updated app.json to $NEXT"

      - name: Build APK on EAS (waits for completion)
        id: build
        run: |
          cd apps/mobile
          eas build \
            --platform android \
            --profile ${{ steps.profile.outputs.profile }} \
            --non-interactive \
            --json > /tmp/eas-build.json
          cat /tmp/eas-build.json | jq .
          APK_URL=$(jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty' /tmp/eas-build.json)
          if [ -z "$APK_URL" ]; then
            BUILD_ID=$(jq -r '.[0].id' /tmp/eas-build.json)
            echo "Build finished but no artifact URL in JSON. Fetching from build:view..."
            eas build:view "$BUILD_ID" --json > /tmp/eas-view.json
            APK_URL=$(jq -r '.artifacts.applicationArchiveUrl // .artifacts.buildUrl // empty' /tmp/eas-view.json)
          fi
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "APK URL: $APK_URL"

      - name: Download APK
        run: |
          curl -L "${{ steps.build.outputs.apk_url }}" -o gymnasia.apk
          ls -lh gymnasia.apk

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            REF="$(git rev-list --max-parents=0 HEAD)"
          else
            REF="$LATEST_TAG"
          fi

          {
            echo "changelog<<CHANGELOG_EOF"
            git log "$REF"..HEAD --pretty=format:"- %s" 2>/dev/null | head -30
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Gymnasia ${{ steps.version.outputs.next }}"
          body: |
            ## Gymnasia ${{ steps.version.outputs.next }}

            **Build profile:** `${{ steps.profile.outputs.profile }}`
            **Version bump:** `${{ steps.version.outputs.current }}` -> `${{ steps.version.outputs.next }}` (${{ steps.version.outputs.bump }})

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Install
            Download `gymnasia.apk` and install on your Android device.
            You may need to enable "Install from unknown sources" in Android settings.
          files: gymnasia.apk
          draft: false
          prerelease: false

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/app.json
          git diff --cached --quiet || git commit -m "chore(release): bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git pull --rebase || true
          git push
